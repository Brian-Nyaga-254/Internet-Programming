<!DOCTYPE html>
<html>
    <title>While loop</title>
    <body>
        <script>
            let x = 1234;
            let y = prompt("Enter the password: ")
            while(x!=y){
                alert("Access denied")
                prompt("Enter the password: ")
        }
        alert("Acces Granted")
        </script>
    </body>
</html>
