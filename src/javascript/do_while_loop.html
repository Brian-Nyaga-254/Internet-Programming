<!DOCTYPE html>
<html> 
    <title>DO WHILE LOOP</title>
    <body> 
        <h1>Countdown from 1 to 10</h1>
        <script> 
            let j = 1;
            do{
                document.write(j+"<br>");
                j++
            }
            while (j <= 10);
            
        </script>

    </body>
</html>
