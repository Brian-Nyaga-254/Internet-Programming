<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays in java</title>
</head>
<body>
    <h1>FRUITS<br>CARS</h1>
    <script>
        const juices = ["mango","orange","pinneaple"]
        const cars = ["Mercedes", "Toyota", "Dodge", "Nissan"]
        document.write(juices[1],"<br>",cars[2],"<br>",cars.length,"<br>")
        for (let i = 0; i< juices.length; i++)
    {
        juices.sort();
        juices.reverse();
        document.write(juices[i],"<br>");
    }
        
    </script>
    
</body>
</html>
